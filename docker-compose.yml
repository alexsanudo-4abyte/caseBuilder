services:
  db:
    image: postgres:15
    container_name: casebuilder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casebuilder
    ports:
      - "5433:5432"
    volumes:
      - casebuilder_db_data:/var/lib/postgresql/data

volumes:
  casebuilder_db_data:
